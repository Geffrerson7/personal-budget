<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: "class",
      };
    </script>
  </head>
  <body
    class="min-h-screen bg-gray-100 text-gray-900 dark:bg-gray-900 dark:text-gray-100"
  >
    <!-- ← P3: bg-gray-50 -->
    <main class="max-w-4xl mx-auto px-4 py-8">
      <header class="mb-6 text-center">
        <h1 class="text-3xl font-bold text-gray-800 dark:text-gray-100 mb-6">
          💰 Gestor de Presupuesto
        </h1>
        <!-- ← P3 -->
        <p class="text-gray-500 dark:text-gray-400 mb-4">
          Tu dinero, bajo control.
        </p>
        <!-- ← P3 -->
        <button
          id="toggle-theme"
          class="p-2 rounded-lg bg-gray-200 dark:bg-gray-700 hover:bg-gray-300 dark:hover:bg-gray-600 transition-all duration-300 hover:scale-110 active:scale-95"
        >
          <svg
            id="icon-sun"
            xmlns="http://www.w3.org/2000/svg"
            width="24"
            height="24"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
            class="hidden dark:block"
          >
            <path stroke="none" d="M0 0h24v24H0z" fill="none" />
            <path d="M9 12a3 3 0 1 0 6 0a3 3 0 1 0 -6 0" />
            <path d="M12 5l0 .01" />
            <path d="M17 7l0 .01" />
            <path d="M19 12l0 .01" />
            <path d="M17 17l0 .01" />
            <path d="M12 19l0 .01" />
            <path d="M7 17l0 .01" />
            <path d="M5 12l0 .01" />
            <path d="M7 7l0 .01" />
          </svg>
          <svg
            id="icon-moon"
            xmlns="http://www.w3.org/2000/svg"
            width="24"
            height="24"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
            class="block dark:hidden"
          >
            <path stroke="none" d="M0 0h24v24H0z" fill="none" />
            <path
              d="M12 3c.132 0 .263 0 .393 0a7.5 7.5 0 0 0 7.92 12.446a9 9 0 1 1 -8.313 -12.454l0 .008"
            />
          </svg>
        </button>
      </header>
      <section class="grid grid-cols-1 md:grid-cols-2 gap-6">
        <!-- Tarjeta resumen -->
        <div
          class="p-6 bg-white dark:bg-gray-800 rounded-xl shadow-lg dark:border dark:border-gray-700 transition-all duration-300 hover:shadow-xl hover:scale-[1.01]"
        >
          <!-- ← P3: bg-white rounded-xl shadow -->
          <h2
            class="text-sm font-semibold text-gray-500 dark:text-gray-400 uppercase tracking-wide"
          >
            Saldo total
          </h2>
          <!-- ← P3 -->
          <p
            id="saldo"
            class="mt-1 text-4xl font-bold text-gray-800 dark:text-white"
          >
            $3454.50
          </p>
          <!-- ← P3 -->
          <div class="flex gap-4 mt-4">
            <div class="flex-1 p-3 rounded-lg bg-green-50 dark:bg-green-900/30">
              <!-- ← P3: verde -->
              <p class="text-xs text-green-700 dark:text-green-300s">
                Ingresos
              </p>
              <!-- ← P3 -->
              <p
                id="ingresos"
                class="text-lg font-semibold text-green-700 dark:text-green-300"
              >
                $3500.00
              </p>
              <!-- ← P3 -->
            </div>
            <div class="flex-1 p-3 rounded-lg bg-red-50 dark:bg-red-900/30">
              <!-- ← P3: rojo -->
              <p class="text-xs text-red-700 dark:text-red-300">Gastos</p>
              <p
                id="gastos"
                class="text-lg font-semibold text-red-700 dark:text-red-300"
              >
                $45.50
              </p>
            </div>
          </div>
        </div>

        <!-- Tarjeta formulario -->
        <div
          class="p-6 bg-white dark:bg-gray-800 rounded-xl shadow-lg dark:border dark:border-gray-700 transition-all duration-300 hover:shadow-xl"
        >
          <!-- ← P3 -->
          <h2
            class="mb-4 text-lg font-semibold text-gray-800 dark:text-gray-100"
          >
            Agregar movimiento
          </h2>
          <!-- ← P3 -->
          <form id="form-mov" class="space-y-3">
            <input
              id="nombre"
              type="text"
              placeholder="Nombre"
              class="w-full p-2 rounded-lg border border-gray-300 dark:border-gray-600 dark:bg-gray-700 dark:text-white focus:outline-none focus:ring-1 focus:ring-blue-500 transition-colors duration-200"
            />
            <select
              id="tipo"
              class="w-full p-2 rounded-lg border border-gray-300 dark:border-gray-600 dark:bg-gray-700 dark:text-white focus:outline-none focus:ring-1 focus:ring-blue-500 transition-colors duration-200"
            >
              <option value="ingreso">Ingreso</option>
              <option value="gasto">Gasto</option>
            </select>
            <input
              id="monto"
              type="number"
              placeholder="Monto"
              class="w-full p-2 rounded-lg border border-gray-300 dark:border-gray-600 dark:bg-gray-700 dark:text-white focus:outline-none focus:ring-1 focus:ring-blue-500 transition-colors duration-200"
            />
            <button
              type="submit"
              class="w-full p-3 bg-blue-600 text-white font-semibold rounded-lg hover:bg-blue-700 active:bg-blue-800 transition-all duration-200 hover:scale-[1.02] active:scale-[0.98]"
            >
              Agregar
            </button>
          </form>
        </div>
      </section>

      <section
        class="mt-6 p-6 bg-white dark:bg-gray-800 rounded-xl shadow dark:border dark:border-gray-700 transition-all duration-500"
      >
        <!-- ← P3 -->
        <h2 class="mb-4 text-lg font-semibold text-gray-800 dark:text-gray-100">
          Movimientos
        </h2>
        <!-- ← P3 -->
        <ul id="lista" class="space-y-2">
          <!-- ← P3: barrita verde (ingreso) / roja (gasto), texto y montos con color -->
          <li
            class="flex items-center justify-between p-3 bg-green-50 border-l-4 border-green-500 rounded"
          >
            <span class="text-gray-800"
              ><span class="font-medium">Salario</span>
              <span class="text-xs text-gray-500">(ingreso)</span></span
            >
            <span class="font-semibold text-green-700">+$3000.00</span>
          </li>
          <li
            class="flex items-center justify-between p-3 bg-red-50 border-l-4 border-red-500 rounded"
          >
            <span class="text-gray-800"
              ><span class="font-medium">Cena</span>
              <span class="text-xs text-gray-500">(gasto)</span></span
            >
            <span class="font-semibold text-red-700">-$45.50</span>
          </li>
          <li
            class="flex items-center justify-between p-3 bg-green-50 border-l-4 border-green-500 rounded"
          >
            <span class="text-gray-800"
              ><span class="font-medium">Freelance</span>
              <span class="text-xs text-gray-500">(ingreso)</span></span
            >
            <span class="font-semibold text-green-700">+$500.00</span>
          </li>
        </ul>
      </section>
    </main>
    <script src="oop-objects.js"></script>
    <script src="app.js"></script>
    <script src="dark-mode.js"></script>
  </body>
</html>
